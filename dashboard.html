<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cool Box Dashboard</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Style sederhana -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
    }

    .card {
      background: white;
      width: 350px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin: 6px 0;
    }

    #status {
      font-weight: bold;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .off { background: #aaa; color: white; }
    .mode1 { background: #f39c12; color: white; }
    .mode2 { background: #3498db; color: white; }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Cool Box Dashboard</h2>

    <p>🌡 Temperature : <span id="temp">--</span> °C</p>
    <p>💧 Humidity : <span id="hum">--</span> %</p>
    <p>Status : <span id="status">--</span></p>

    <!-- GRAFIK SUHU -->
    <canvas id="tempChart" height="200"></canvas>

    <br>

    <button class="off" onclick="setMode(0)">OFF</button>
    <button class="mode1" onclick="setMode(1)">MODE 1 (18–25°C)</button>
    <button class="mode2" onclick="setMode(2)">MODE 2 (8–15°C)</button>
  </div>

  <!-- Dashboard Logic -->
  <script src="dashboard.js"></script>

</body>
</html>

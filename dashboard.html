<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Medical Cool Box Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:#fff;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:20px;
  background:#111827;
  border-radius:16px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.title{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:#1f2937;
  padding:12px;
  border-radius:10px;
}

.label{color:#9ca3af;font-size:12px;}
.value{font-size:18px;font-weight:bold;}

.status{
  padding:5px 10px;
  border-radius:8px;
  display:inline-block;
  font-weight:bold;
}

.cooling{background:#f59e0b;}
.stable{background:#22c55e;}
.off{background:#6b7280;}

table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
  font-size:13px;
}

td,th{
  border:1px solid #374151;
  padding:6px;
  text-align:center;
}

canvas{margin-top:15px;}
</style>
</head>

<body>

<div class="container">

  <div class="title">🏥 MEDICAL COOL BOX MONITOR</div>

  <!-- STATUS PANEL -->
  <div class="grid">

    <div class="box">
      <div class="label">WAKTU</div>
      <div class="value" id="time">--:--</div>
    </div>

    <div class="box">
      <div class="label">SUHU</div>
      <div class="value"><span id="temp">--</span> °C</div>
    </div>

    <div class="box">
      <div class="label">MODE</div>
      <div class="value" id="mode">-</div>
    </div>

    <div class="box">
      <div class="label">STATUS</div>
      <div class="value">
        <span id="status" class="status off">OFF</span>
      </div>
    </div>

  </div>

  <!-- CHART -->
  <canvas id="chart"></canvas>

  <!-- LOG -->
  <h3>LOG DATA MEDIS</h3>
  <table>
    <thead>
      <tr>
        <th>Waktu</th>
        <th>Suhu</th>
        <th>Mode</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="log"></tbody>
  </table>

</div>

<script src="dashboard.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cool Box Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#1b1f3b; color:white; padding:20px; }
    .card { max-width:800px; margin:auto; background:#000000aa; padding:20px; border-radius:15px; }
    button { width:100%; margin-top:8px; padding:10px; border:none; border-radius:10px; cursor:pointer; }
    .off{background:#777}.mode1{background:#f39c12}.mode2{background:#3498db}
    .save{background:#2ecc71}.delete{background:#c0392b}.export{background:#8e44ad}
  </style>
</head>

<body>

<div class="card">

  <h2>Cool Box Dashboard</h2>

  <p>Temp: <span id="temp">--</span> °C</p>
  <p>Status: <span id="status">--</span></p>

  <canvas id="tempChart"></canvas>

  <button class="off" onclick="setMode(0)">OFF</button>
  <button class="mode1" onclick="setMode(1)">MODE 1</button>
  <button class="mode2" onclick="setMode(2)">MODE 2</button>

  <button class="save" onclick="simpanManual()">Simpan</button>
  <button class="delete" onclick="hapusSemua()">Hapus</button>
  <button class="export" onclick="exportExcel()">Export Excel</button>

  <table border="1" width="100%" style="margin-top:10px;">
    <thead>
      <tr>
        <th>Waktu</th>
        <th>Suhu</th>
        <th>Mode</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="logTable"></tbody>
  </table>

</div>

<script src="dashboard.js"></script>

</body>
</html>
